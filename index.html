<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Countdown Lampe Controller</title>
    <style>
        body { font-family: Arial, sans-serif; text-align: center; background: #f0f2f5; padding: 20px; }
        .card { background: white; max-width: 400px; margin: 20px auto; padding: 30px; border-radius: 15px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); }
        button { width: 100%; padding: 15px; margin: 10px 0; font-size: 16px; border: none; border-radius: 8px; cursor: pointer; font-weight: bold; }
        .btn-connect { background: #007bff; color: white; }
        .btn-start { background: #28a745; color: white; }
        .btn-reset { background: #dc3545; color: white; }
        .btn-time { background: #17a2b8; color: white; }
        input { width: 90%; padding: 12px; font-size: 16px; margin: 10px 0; border: 1px solid #ccc; border-radius: 8px; text-align: center; }
        #status { color: #666; margin-bottom: 20px; font-style: italic; font-weight: bold; }
    </style>
</head>
<body>

<div class="card">
    <h2>⏱️ Countdown Lampe</h2>
    <div id="status">Nicht verbunden</div>
    
    <button class="btn-connect" id="connectBtn" onclick="connectBLE()">Mit Lampe verbinden</button>
    <hr style="margin: 20px 0; border: 0; border-top: 1px solid #eee;">
    
    <button class="btn-start" onclick="sendBefehl('S')">▶️ Countdown Starten (S)</button>
    <button class="btn-reset" onclick="sendBefehl('R')">⏹️ Zurücksetzen (R)</button>
    
    <hr style="margin: 20px 0; border: 0; border-top: 1px solid #eee;">
    
    <h3>Zeit konfigurieren</h3>
    <input type="number" id="minutenInput" value="5" min="1" max="120">
    <button class="btn-time" onclick="setTimer()">⏳ Zeit einstellen (T)</button>
</div>

<script>
// UUIDs (Wichtig: Auf GitHub müssen sie komplett KLEINGESCHRIEBEN sein!)
const SERVICE_UUID = "6e400001-b5a3-f393-e0a9-e50e24dcca9e";
const RX_CHARACTERISTIC_UUID = "6e400002-b5a3-f393-e0a9-e50e24dcca9e";

let bleDevice = null;
let rxCharacteristic = null;

async function connectBLE() {
    const statusDiv = document.getElementById('status');
    try {
        statusDiv.innerText = "Suche nach Gerät...";
        
        // Optimierter Filter: Wir fordern den Service direkt an
        bleDevice = await navigator.bluetooth.requestDevice({
            filters: [{ name: 'ESP32-C3 Countdown Lampe' }],
            optionalServices: [SERVICE_UUID]
        });

        statusDiv.innerText = "Verbinde mit GATT Server...";
        const server = await bleDevice.gatt.connect();
        
        statusDiv.innerText = "Hole Bluetooth Service...";
        const service = await server.getPrimaryService(SERVICE_UUID);
        
        statusDiv.innerText = "Hole Charakteristik...";
        rxCharacteristic = await service.getCharacteristic(RX_CHARACTERISTIC_UUID);

        statusDiv.innerText = "🟢 Erfolgreich verbunden!";
        document.getElementById('connectBtn').innerText = "Verbunden";
        document.getElementById('connectBtn').style.background = "#28a745";
    } catch (error) {
        console.error("Bluetooth Fehler:", error);
        // Zeigt uns nun den exakten Fehler an, falls es fehlschlägt
        statusDiv.innerText = "❌ Fehler: " + error.message;
    }
}

async function sendBefehl(text) {
    if (!rxCharacteristic) {
        alert("Bitte zuerst mit der Lampe verbinden!");
        return;
    }
    try {
        const encoder = new TextEncoder();
        await rxCharacteristic.writeValueWithoutResponse(encoder.encode(text));
        console.log("Gesendet: " + text);
    } catch (error) {
        console.error("Fehler beim Senden:", error);
    }
}

function setTimer() {
    const min = document.getElementById('minutenInput').value;
    if(min > 0) {
        sendBefehl("T" + min);
    }
}
</script>
</body>
</html>
